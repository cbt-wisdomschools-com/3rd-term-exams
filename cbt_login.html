            color: #0a2f44;
        }

            margin-right: 6px;
        }
        .input-group input {

            border-radius: 50px;
            font-size: 1rem;

        }
        .input-group input:focus {

            border-color: #FFD700;

        }
        .btn {

            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn:hover {

            color: #0a2f44;
            transform: scale(1.02);
        }

            font-size: 0.85rem;

            background: #f8d7da;
            padding: 8px;
            border-radius: 50px;

        'admin': 'admin_dashboard.html'
    };

    // ======================= EXAM ATTEMPT TRACKING (Initialize) =======================
    function initializeAttemptTracking(cls) {
        const key = `${cls}_exam_attempts`;
        if (!localStorage.getItem(key)) {
            localStorage.setItem(key, JSON.stringify({}));
            console.log(`✅ Initialized attempt tracking for ${cls}`);
        }
    }

    // ======================= LOGIN HANDLER =======================
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorDiv = document.getElementById('errorMsg');
        const successDiv = document.getElementById('successMsg');

        // Hide previous messages
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';

        // Validate input
        if (!username || !password) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = '❌ Please fill in both fields.';
            return;
        }

        // Find user
        const user = users.find(u => u.username === username && u.password === password);
        if (!user) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = '❌ Invalid username or password.';
            return;
        }

        // Check payment status
        if (user.paid === false) {
            localStorage.setItem('debtorUsername', username);
            window.location.href = 'debtors.html';
            return;
        }

        // Get dashboard page
        const classPrefix = user.classPrefix;
        const dashboardPage = classMap[classPrefix];
        if (!dashboardPage) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = '❌ Invalid class prefix. Contact admin.';
            return;
        }

        // Initialize attempt tracking for this class if not exists
        initializeAttemptTracking(classPrefix);

        // Store user info in localStorage
        localStorage.setItem('studentUsername', username);
        localStorage.setItem('studentClass', classPrefix);
        localStorage.setItem('studentImage', user.image || 'default.jpg');
        localStorage.setItem('loggedInUser', JSON.stringify(user));
        localStorage.setItem('isLoggedIn', 'true');

        // Show success message
        successDiv.style.display = 'block';
        successDiv.textContent = '✅ Login successful! Redirecting...';

        // Redirect after short delay
        setTimeout(() => {
            window.location.href = dashboardPage;
        }, 800);
    });

    // ======================= ENTER KEY SUPPORT =======================
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }
    });

    console.log('✅ Login page loaded. Attempt tracking ready.');
</script>
