<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Results | Wisdom Foundation School</title>
    <link rel="icon" type="image/x-icon" href="fav_icon2.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #FF00FF 0%, #FF1493 50%, #C71585 100%);
            position: relative;
        }

        /* Decorative background circles */
        body::before {
            content: "";
            position: absolute;
            top: -20%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: rgba(255, 215, 0, 0.15);
            border-radius: 50%;
            z-index: 0;
            animation: float 6s ease-in-out infinite;
        }

        body::after {
            content: "";
            position: absolute;
            bottom: -20%;
            left: -10%;
            width: 350px;
            height: 350px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 50%;
            z-index: 0;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
            100% { transform: translate(0, 0) scale(1); }
        }

        .result-card {
            max-width: 650px;
            width: 100%;
            background: white;
            border-radius: 48px;
            padding: 40px 35px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
            backdrop-filter: blur(2px);
            transition: transform 0.3s ease;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }

        .result-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(255, 215, 0, 0.3);
        }

        .logout-result {
            position: absolute;
            top: 25px;
            right: 25px;
            background: linear-gradient(135deg, #FFD700, #FFC107);
            color: #1a1a2e;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.4);
        }

        .logout-result:hover {
            background: linear-gradient(135deg, #FFC107, #FFB300);
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.5);
        }

        .school-logo img {
            width: 90px;
            margin-bottom: 15px;
            background: white;
            border-radius: 50%;
            padding: 8px;
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.3);
            border: 2px solid #FFD700;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FF8C00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .school-motto {
            font-size: 0.9rem;
            color: #FFD700;
            background: rgba(255, 215, 0, 0.1);
            display: inline-block;
            padding: 4px 16px;
            border-radius: 30px;
            margin-bottom: 15px;
            font-weight: 600;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .subject-name {
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            display: inline-block;
            padding: 6px 20px;
            border-radius: 60px;
            color: #1a1a2e;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
        }

        .student-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin: 25px 0;
            background: linear-gradient(135deg, #FFF8E1, #FFF3CD);
            padding: 20px 25px;
            border-radius: 40px;
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .student-avatar {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #FFD700;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
        }

        .student-details p {
            color: #5a4a2a;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        .student-details h3 {
            color: #1a1a2e;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .score-circle {
            width: 200px;
            height: 200px;
            background: linear-gradient(145deg, #1a1a2e, #2d2d44);
            border-radius: 50%;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 4px solid #FFD700;
            position: relative;
        }

        .score-circle::before {
            content: "⭐";
            position: absolute;
            top: -15px;
            right: -15px;
            font-size: 2rem;
            animation: spin 10s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .score-number {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: #FFD700;
        }

        .percentage {
            font-size: 1.4rem;
            margin-top: 8px;
            font-weight: 700;
            background: rgba(255, 215, 0, 0.2);
            padding: 4px 12px;
            border-radius: 40px;
            color: #FFD700;
        }

        .message {
            margin: 25px 0 20px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #1a1a2e;
            background: linear-gradient(135deg, #FFF8E1, #FFECD2);
            padding: 12px 20px;
            border-radius: 60px;
            display: inline-block;
            width: auto;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .confirm-section {
            background: linear-gradient(135deg, #FFF8E1, #FFECD2);
            border: 2px solid #FFD700;
            border-radius: 28px;
            padding: 22px 20px;
            margin: 25px 0 15px;
            text-align: center;
            box-shadow: 0 6px 14px rgba(255, 215, 0, 0.2);
        }

        .confirm-message {
            font-size: 1rem;
            color: #5a4a2a;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .confirm-message strong {
            color: #FFD700;
        }

        .btn {
            display: inline-block;
            background: #1a1a2e;
            color: white;
            padding: 12px 32px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 8px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .btn-success {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #1a1a2e;
            font-weight: 800;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #FFC107, #FF8C00);
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.5);
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        #datetime {
            font-size: 0.75rem;
            color: #999;
            margin-top: 20px;
            border-top: 1px solid #e2e8f0;
            padding-top: 15px;
        }

        .footer-text {
            font-size: 0.7rem;
            color: #999;
            margin-top: 10px;
            font-weight: 500;
        }
        .footer-text i {
            color: #FFD700;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #1a1a2e;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        .btn-loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        @media (max-width: 550px) {
            .result-card {
                padding: 25px 20px;
            }
            .student-info {
                flex-direction: column;
                gap: 12px;
            }
            .score-circle {
                width: 160px;
                height: 160px;
            }
            .score-number {
                font-size: 2.5rem;
            }
            h1 {
                font-size: 1.6rem;
            }
            .logout-result {
                top: 15px;
                right: 15px;
                padding: 6px 14px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
<div class="result-card">
    <button class="logout-result" id="logoutResultBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    <div class="school-logo">
        <img src="img/wisdom_logo1.png" alt="Wisdom Foundation School Logo">
    </div>
    <h1>📊 Examination Result</h1>
    <div class="school-motto"><i class="fas fa-graduation-cap"></i> Gateway to the university</div>
    <div class="subject-name" id="subjectName">Mathematics</div>

    <div class="student-info">
        <img id="resultAvatar" class="student-avatar" src="img/default.jpg" alt="Student">
        <div class="student-details">
            <p>STUDENT'S NAME :</p><h3 id="resultName">Student Name</h3>
            <p>STUDENT'S CLASS :</p><p id="resultClass">Class: JSS1</p>
        </div>
    </div>

    <div class="score-circle">
        <div class="score-number"><span id="scoreValue">0</span>/<span id="totalValue">0</span></div>
        <div class="percentage" id="percentageValue">0%</div>
    </div>

    <div class="message" id="scoreMessage"></div>

    <!-- Confirmation Section -->
    <div class="confirm-section" id="confirmationSection">
        <div class="confirm-message">
            📝 <strong>Final Step:</strong> Click the button below to confirm your exam as completed.
        </div>
        <button class="btn btn-success" id="confirmBtn">✅ SUBMIT</button>
    </div>

    <p id="datetime"></p>
    <div class="footer-text"><i class="fas fa-crown"></i> Wisdom Foundation School Ado Ekiti – Gateway to the university</div>
</div>

<script>
    // ======================= DATE & TIME =======================
    function updateDateTime() {
        let now = new Date();
        let day = now.getDate();
        let month = now.toLocaleString('default', { month: 'long' });
        let year = now.getFullYear();
        let suffix = "th";
        if (day === 1 || day === 21 || day === 31) suffix = "st";
        else if (day === 2 || day === 22) suffix = "nd";
        else if (day === 3 || day === 23) suffix = "rd";
        let hours = now.getHours();
        let minutes = now.getMinutes();
        let seconds = now.getSeconds();
        let ampm = hours >= 12 ? "PM" : "AM";
        hours = hours % 12 || 12;
        minutes = minutes < 10 ? "0" + minutes : minutes;
        seconds = seconds < 10 ? "0" + seconds : seconds;
        let formattedDateTime = `${month} ${day}${suffix} ${year}, ${hours}:${minutes}:${seconds} ${ampm}`;
        document.getElementById("datetime").innerText = formattedDateTime;
        setTimeout(updateDateTime, 1000);
    }

    // ======================= LOGOUT =======================
    function logout() {
        if (confirm("Are you sure you want to logout? Your exam result is saved.")) {
            localStorage.removeItem('studentUsername');
            localStorage.removeItem('studentClass');
            localStorage.removeItem('studentImage');
            localStorage.removeItem('loggedInUser');
            localStorage.removeItem('examScore');
            localStorage.removeItem('totalQuestions');
            localStorage.removeItem('pendingClass');
            localStorage.removeItem('pendingSubject');
            localStorage.removeItem('pendingUsername');
            sessionStorage.clear();
            window.location.href = 'cbt_login.html';
        }
    }

    // ======================= EXAM ATTEMPT TRACKING (Matches Dashboard) =======================
    function getExamAttempts(cls) {
        const key = `${cls}_exam_attempts`;
        const stored = localStorage.getItem(key);
        return stored ? JSON.parse(stored) : {};
    }

    function saveExamAttempts(cls, data) {
        const key = `${cls}_exam_attempts`;
        localStorage.setItem(key, JSON.stringify(data));
    }

    // This function matches exactly with the dashboard's markExamCompleted
    function markExamCompleted(cls, sub, username) {
        const attempts = getExamAttempts(cls);
        if (!attempts[username]) {
            attempts[username] = {};
        }
        attempts[username][sub] = true;
        saveExamAttempts(cls, attempts);
        console.log(`✅ Exam marked as completed for ${username} - ${sub} in ${cls}`);
        return true;
    }

    // ======================= CONFIRM ATTEMPT (Saves to localStorage) =======================
    function confirmAttempt() {
        // Get the button and show loading state
        const confirmBtn = document.getElementById('confirmBtn');
        const originalText = confirmBtn.innerHTML;
        confirmBtn.innerHTML = '<span class="spinner"></span> Saving...';
        confirmBtn.disabled = true;
        confirmBtn.classList.add('btn-loading');

        // Gather all required data (matches dashboard flow)
        let cls = localStorage.getItem("pendingClass") 
               || localStorage.getItem("examClass")
               || sessionStorage.getItem("class");
        
        let sub = localStorage.getItem("pendingSubject") 
                || sessionStorage.getItem("subject");
        
        let username = localStorage.getItem("pendingUsername") 
                     || localStorage.getItem("studentUsername");
        
        // Validate data
        if (!cls || !sub || !username) {
            alert("❌ Error: Could not confirm attempt. Missing class, subject, or username. Please contact administrator.");
            confirmBtn.innerHTML = originalText;
            confirmBtn.disabled = false;
            confirmBtn.classList.remove('btn-loading');
            return;
        }

        // Save the exam attempt to localStorage (matches dashboard format)
        try {
            const success = markExamCompleted(cls, sub, username);
            
            if (success) {
                // Clear pending data
                localStorage.removeItem("pendingClass");
                localStorage.removeItem("pendingSubject");
                localStorage.removeItem("pendingUsername");
                localStorage.removeItem("pendingAttempt");
                localStorage.removeItem("examClass");
                localStorage.removeItem("examSubject");
                sessionStorage.removeItem("class");
                sessionStorage.removeItem("subject");
                sessionStorage.removeItem("examInfo");
                
                // Hide the confirmation section
                const confirmDiv = document.getElementById("confirmationSection");
                if (confirmDiv) confirmDiv.style.display = "none";
                
                // Show success message
                confirmBtn.innerHTML = '✅ Saved Successfully!';
                confirmBtn.style.background = 'linear-gradient(135deg, #28a745, #20c997)';
                
                alert("✅ Your exam attempt has been confirmed and saved successfully!\n\nYou have completed this exam.");
                
                // Redirect to login page after a short delay
                setTimeout(() => {
                    window.location.href = 'cbt_login.html';
                }, 1500);
            } else {
                throw new Error("Failed to save exam attempt");
            }
        } catch (error) {
            console.error("Error saving exam attempt:", error);
            alert("❌ An error occurred while saving your exam attempt. Please try again or contact support.");
            confirmBtn.innerHTML = originalText;
            confirmBtn.disabled = false;
            confirmBtn.classList.remove('btn-loading');
        }
    }

    // ======================= DISPLAY RESULT & SUBJECT NAME =======================
    document.addEventListener('DOMContentLoaded', function() {
        updateDateTime();
        
        const studentName = localStorage.getItem('studentUsername') || 'Guest Student';
        const studentImage = localStorage.getItem('studentImage') || 'default.jpg';
        let studentClass = localStorage.getItem('studentClass') || 'JSS1';
        const score = parseInt(localStorage.getItem('examScore') || '0');
        const total = parseInt(localStorage.getItem('totalQuestions') || '0');
        const percentage = total > 0 ? Math.round((score / total) * 100) : 0;
        
        let subjectDisplay = sessionStorage.getItem('subjectDisplay') 
                          || localStorage.getItem('examSubject')
                          || "Mathematics";
        if (subjectDisplay && typeof subjectDisplay === 'string') {
            subjectDisplay = subjectDisplay.replace(/\b\w/g, l => l.toUpperCase());
        }
        document.getElementById('subjectName').innerText = subjectDisplay;
        
        document.getElementById('resultName').innerText = studentName;
        document.getElementById('resultClass').innerText = `Class: ${studentClass.toUpperCase()}`;
        const avatar = document.getElementById('resultAvatar');
        avatar.src = `img/${studentImage}`;
        avatar.onerror = function() { this.src = 'img/default.jpg'; };
        
        document.getElementById('scoreValue').innerText = score;
        document.getElementById('totalValue').innerText = total;
        document.getElementById('percentageValue').innerText = percentage + '%';
        
        let message = '';
        if (percentage >= 80) message = '🎉 Excellent! Keep up the great work!';
        else if (percentage >= 60) message = '👍 Good job! You can do even better.';
        else if (percentage >= 50) message = '📚 Fair effort. Review and try again.';
        else message = '💪 Needs improvement. Keep studying!';
        document.getElementById('scoreMessage').innerText = message;
        
        // Set pending data for confirmation (matches dashboard flow)
        if (!localStorage.getItem("pendingClass") && (localStorage.getItem("examClass") || sessionStorage.getItem("class"))) {
            let cls = localStorage.getItem("examClass") || sessionStorage.getItem("class");
            localStorage.setItem("pendingClass", cls);
        }
        if (!localStorage.getItem("pendingSubject") && sessionStorage.getItem("subject")) {
            localStorage.setItem("pendingSubject", sessionStorage.getItem("subject"));
        }
        if (!localStorage.getItem("pendingUsername") && localStorage.getItem("studentUsername")) {
            localStorage.setItem("pendingUsername", localStorage.getItem("studentUsername"));
        }
        
        // Check if we have all needed data for confirmation
        const pendingClass = localStorage.getItem("pendingClass");
        const pendingSubject = localStorage.getItem("pendingSubject");
        const pendingUsername = localStorage.getItem("pendingUsername");
        
        // If the exam is already completed, hide the confirmation section
        if (pendingClass && pendingSubject && pendingUsername) {
            const attempts = getExamAttempts(pendingClass);
            if (attempts[pendingUsername] && attempts[pendingUsername][pendingSubject] === true) {
                const confirmSection = document.getElementById("confirmationSection");
                if (confirmSection) {
                    confirmSection.style.display = "none";
                }
            }
        }
        
        // Attach event listener to confirm button
        document.getElementById('confirmBtn').addEventListener('click', confirmAttempt);
        document.getElementById('logoutResultBtn').addEventListener('click', logout);
    });
</script>
</body>
</html>
