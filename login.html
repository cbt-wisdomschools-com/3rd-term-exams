        }
        .input-group label {

            display: block;
            margin-bottom: 6px;
            color: #0a2f44;
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 50px;
            font-size: 1rem;
            transition: 0.2s;
        }
        .input-group input:focus {

            border-color: #ffb347;

        }
        .btn {
            background: #0a2f44;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn:hover {

        }
        .error-msg {

            background: #f8d7da;
            padding: 8px;
            border-radius: 50px;

        }

            font-size: 0.75rem;
            color: #6c757d;
        }
        @media (max-width: 500px) {

    };

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorDiv = document.getElementById('errorMsg');

        if (!username || !password) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = 'Please fill in both fields.';
            return;
        }

        const user = users.find(u => u.username === username && u.password === password);
        if (!user) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = 'Invalid username or password.';
            return;
        }

        // Check payment status
        if (user.paid === false) {
            localStorage.setItem('debtorUsername', username);
            window.location.href = 'debtors.html';
            return;
        }

        const classPrefix = user.classPrefix;
        const dashboardPage = classMap[classPrefix];
        if (!dashboardPage) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = 'Invalid class prefix. Contact admin.';
            return;
        }

        // Store full user info (including image) in localStorage
        localStorage.setItem('studentUsername', username);
        localStorage.setItem('studentClass', classPrefix);
        localStorage.setItem('studentImage', user.image);   // store image filename
        localStorage.setItem('loggedInUser', JSON.stringify(user));

        window.location.href = dashboardPage;
    });
